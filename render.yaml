services:
  - type: web
    name: ppsp-app
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: |
      apt-get update
      apt-get install -y python3-dev build-essential
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ppsp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

databases:
  - name: ppsp-db
    plan: free
    databaseName: ppsp
    user: ppsp_user
